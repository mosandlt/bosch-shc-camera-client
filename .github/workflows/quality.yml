name: Quality

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python-quality:
    name: ruff · mypy · codespell · pylint · pip-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
      - name: Install test + tooling dependencies
        run: pip install -e . ruff mypy pylint pip-audit pytest pytest-asyncio pytest-cov codespell types-defusedxml
      - name: ruff format --check
        run: ruff format --check src tests
      - name: ruff check
        run: ruff check src tests
      - name: mypy --strict
        run: mypy
      - name: codespell
        run: codespell src tests
      - name: pylint
        run: pylint --rcfile=pyproject.toml src/bosch_shc_camera_client
      - name: pip-audit (our declared deps)
        run: |
          python3 -c "import tomllib;print(chr(10).join(tomllib.load(open('pyproject.toml','rb'))['project']['dependencies']))" > /tmp/our_reqs.txt
          pip-audit -r /tmp/our_reqs.txt

  tests:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
      - name: Install test dependencies
        run: pip install -e . pytest pytest-asyncio pytest-cov
      - name: Run pytest with coverage
        run: pytest tests/ -q --cov src/bosch_shc_camera_client --cov-report term-missing --cov-fail-under=100
