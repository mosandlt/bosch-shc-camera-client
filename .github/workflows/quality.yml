name: Quality

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e . ruff mypy pytest pytest-asyncio codespell
      - name: ruff format --check
        run: ruff format --check src tests
      - name: ruff check
        run: ruff check src tests
      - name: mypy --strict
        run: mypy --strict src
      - name: codespell
        run: codespell src tests
      - name: pytest
        run: pytest
